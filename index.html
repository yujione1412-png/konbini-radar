<!DOCTYPE html>
<!--
═══════════════════════════════════════════════════════════════════════════
  コンビニレーダー （konbini-radar）
  現在バージョン: v1.3.0
═══════════════════════════════════════════════════════════════════════════

■ このファイルでできること
  ・現在地のまわりのコンビニを探す（探す範囲は 200m〜3000m で調整できる）
  ・画面中心の小さな十字（レティクル）に合わせて、指定した位置のまわりを探せる
    （「十字の位置で探す」を押すと、その場所に◎ピンが立って中心が分かる）
  ・範囲スライダーを動かすと、表示中の検索（周辺・ルート沿い）が新しい範囲で
    自動的にかけ直される。地図の位置・拡大率・ルート表示はそのまま
  ・地図を「長押し」して◎ピンを置くと、その場所を検索の中心・ルートの出発地にできる
  ・「ルート沿い」ボタンで、出発地→到着地の道沿いのコンビニを探せる
    （出発地は「現在地から出発」ワンタップでもOK。画面の案内に従うだけ）
  ・見つけたコンビニまでのルート（徒歩／車）をアプリ内に表示する
  ・「Google Mapでルートを開く」でGoogleマップにも切り替えられる（ナビは自動開始しない）
  ・ルートを表示した履歴を端末内（localStorage）に残し、あとから再表示できる

■ 操作のきほん
  ・地図は全画面。操作は下の小さなパネルにまとまっている
  ・「現在地で探す」= 現在地のまわり ／「十字の位置で探す」= 地図を動かして十字を合わせた場所のまわり
  ・◎ピン: 地図を長押しで置く／動かす。ピンをタップすると「このあたりを探す」「外す」を選べる
  ・ルートの出発地: ◎ピンがあればピンから、なければ現在地から（自動）
  ・ルート表示や徒歩／車の切り替えでは、地図の位置と拡大率は動かさない（見ている場所を保つ）

■ 次にやること（アイデア）
  ・お気に入りの店を登録できるようにする
  ・営業時間の表示（データが取れる場合のみ）

■ ★ 再開のしかた（大事！）
  このファイル自体が「セーブデータ」です。
  作業を続けたいときは、このファイル全体をコピーしてAIのチャットに貼り付け、
  「このファイルの続きから機能を追加して」と伝えてください。
  冒頭のこのコメントに現状・履歴がすべて書いてあるので、AIが引き継げます。

■ バージョン履歴
  v0.1.0  最初の版。現在地のまわりのコンビニを探せるようにした（データはOSM）
  v0.2.0  探す範囲スライダー・探索円の表示を追加
  v0.3.0  コンビニまでのルート表示（OSRM・徒歩／車）を追加
  v0.4.0  データ源をOSM→YOLP（Yahoo!ローカルサーチ）に変更。
          日本ではOSMのコンビニ登録漏れが多く実用にならなかったため。
          同じ店が複数出る問題を「名前が同じ＋30m以内なら1件にまとめる」方式で解決
  v0.5.0  「中心を指定」ピンを追加。地図を動かしても検索中心が勝手に変わらないよう修正。
          ルート表示履歴（localStorage）と履歴シートを追加
  v0.6.0  A→B ルート沿いのコンビニ検索を追加。出発地・移動手段トグルを追加。
          トグル切り替えで表示中のルートを自動で引き直すようにした
  v1.0.0  デザインを全面リニューアルし「コンビニレーダー」に改名
  v1.1.0  使いやすさを全面見直し。
          ・地図を全画面にし、操作を画面下の小さなパネルに集約（地図が広く見える）
          ・◎ピンは「地図を長押し」で置く方式に変更（専用ボタンと十字マークを廃止）
          ・「出発」トグルを廃止し、◎ピンがあればピンから／なければ現在地から出発に自動化
          ・ルート沿い検索を、画面の案内に従うステップ操作に一新
            （「現在地から出発」ボタン・やり直し・中止を追加。終わると自動でモード終了）
          ・状況表示を地図に浮かぶカードにし、不要なときは消えるようにした
  v1.2.0  地図の見やすさを改善。
          ・ルート表示中のウインドウを1行の小さなカードにした（地図やルートに重ならない）
          ・ルート表示時と徒歩／車の切り替え時に、地図の位置・拡大率を動かさないようにした
          ・画面中心に目立たない小さな十字（レティクル）を復活
          ・「十字の位置で探す」ボタンを追加し、現在地とは別の指定位置を中心に探せるようにした
          ・「ルート沿い」ボタンを地図右下に移動し、下のパネルをさらに小さくした
  v1.3.0  検索まわりの使い勝手を改善。
          ・「十字の位置で探す」と、その場所に◎ピンが立ち検索の中心が分かるようにした
          ・範囲スライダーを動かすと、表示中の検索を新しい範囲で自動的にかけ直すようにした
            （地図の位置・拡大率・ルート表示は動かさない。円は即時、検索は0.5秒後に実行）
          ・「◯件見つかりました」の表示を1行の小さなカードにし、ボタン類を廃止
            （Google Mapボタンは0件・失敗のときだけ出す）
          ・「現在地で探す」を押したときは◎ピンを自動で外すようにした（出発地の混乱を防ぐ）

■ 使っている無料サービス（すべてカード登録不要）
  ・Leaflet 1.9.4 …………… 地図の表示（CDN: cdnjs）
  ・OpenStreetMap …………… 地図タイル（帰属表示あり）
  ・YOLP Yahoo!ローカルサーチAPI … コンビニ検索の主データ源（1日5万件まで無料）
  ・Overpass API（OSM） …… Client ID未設定時の予備のコンビニ検索
  ・OSRM（FOSSGIS公開サーバー） … ルート検索（徒歩／車）
  ・Google Maps URLs ……… Googleマップをリンクで開くだけ（キー不要）

■ 知っておいてほしい限界
  ・位置情報は https のページでしか取れません（Vercelなら大丈夫）
  ・YOLPでも店の取りこぼしはゼロになりません（0件・失敗のときはGoogle Mapを開くボタンが出ます）
  ・OSRM/Overpassの公開サーバーは混みあうと失敗することがあります（時間をおいて再試行）
  ・履歴はこの端末のブラウザの中だけに保存されます（他の端末には出ません）
═══════════════════════════════════════════════════════════════════════════
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>コンビニレーダー</title>

<!-- 地図ライブラリ Leaflet（CDN） -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<!-- タイトル用のやわらかい丸ゴシック（読み込めない場合は端末の標準フォントになる） -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<style>
/* ============================================================
   デザインの基本色（ここを変えると全体の色が変わる）
   ============================================================ */
:root{
  --ink:    #1D3229;  /* 深い緑がかった墨色：文字・Bピン */
  --store:  #0FA36B;  /* 緑：コンビニのピン・検索ボタン・探索円 */
  --me:     #2F7DF6;  /* 青：現在地・A地点・ルート沿いの線 */
  --center: #E8590C;  /* 橙：◎ピン（長押しで置く） */
  --route:  #7048E8;  /* 紫：店へのルート線・徒歩/車の選択色 */
  --danger: #D93025;  /* 赤：エラー・削除 */
  --card:   rgba(255,255,255,.96);            /* 浮かぶカードの白 */
  --shadow: 0 4px 18px rgba(29,50,41,.22);    /* カードの影 */
  --radius: 16px;     /* 角の丸み */
}

*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; overflow:hidden; }
body{
  font-family:"Hiragino Sans","Noto Sans JP","Yu Gothic UI",system-ui,sans-serif;
  color:var(--ink); font-size:15px;
}
button{ font-family:inherit; cursor:pointer; border:none; background:none; }

/* ============================================================
   地図は画面いっぱい。UIはすべてその上に浮かべる
   ============================================================ */
#map{ position:fixed; inset:0; z-index:1; }

/* ---- 上部：ブランドと履歴（小さなピル） ---- */
#brand{
  position:fixed; z-index:20;
  top:calc(10px + env(safe-area-inset-top)); left:12px;
  background:var(--card); box-shadow:var(--shadow);
  border-radius:999px; padding:8px 14px 8px 11px;
  display:flex; align-items:center; gap:8px;
}
.logo-dot{ /* レーダーのように脈打つ緑の点（このアプリのシンボル） */
  width:10px; height:10px; border-radius:50%;
  background:var(--store); position:relative; flex:none;
}
.logo-dot::after{
  content:""; position:absolute; inset:-4px; border-radius:50%;
  border:2px solid var(--store); opacity:.7;
  animation:radar 2s ease-out infinite;
}
@keyframes radar{
  0%{ transform:scale(.4); opacity:.8; }
  100%{ transform:scale(1.8); opacity:0; }
}
@media (prefers-reduced-motion: reduce){
  .logo-dot::after, .me-icon::after{ animation:none; opacity:.4; }
}
#brand b{
  font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN",sans-serif;
  font-size:14.5px; font-weight:700; letter-spacing:.03em;
}
#historyBtn{
  position:fixed; z-index:20;
  top:calc(10px + env(safe-area-inset-top)); right:12px;
  background:var(--card); box-shadow:var(--shadow);
  border-radius:999px; padding:9px 16px;
  font-size:13px; font-weight:700; color:var(--ink);
}

/* ---- 右下：ルート沿い・現在地ボタン（縦に並ぶ） ---- */
#meBtn{
  position:fixed; z-index:20; right:12px;
  width:46px; height:46px; border-radius:50%;
  background:var(--card); box-shadow:var(--shadow);
  color:var(--me); font-size:19px;
  display:flex; align-items:center; justify-content:center;
}
#abBtn{
  position:fixed; z-index:20; right:12px;
  background:var(--card); box-shadow:var(--shadow);
  border-radius:999px; padding:11px 15px;
  font-size:13px; font-weight:700;
  color:var(--me); border:2px solid var(--me);
}
#abBtn.on{ background:var(--me); color:#fff; }

/* ---- 画面中心の小さな十字（レティクル）。表示だけで押せない ---- */
#reticle{
  position:fixed; left:50%; top:50%; z-index:10;
  width:18px; height:18px; transform:translate(-50%,-50%);
  pointer-events:none; opacity:.35;
}
#reticle::before,#reticle::after{
  content:""; position:absolute; background:var(--ink);
}
#reticle::before{ left:50%; top:0; width:1.5px; height:100%; transform:translateX(-50%); }
#reticle::after{ top:50%; left:0; height:1.5px; width:100%; transform:translateY(-50%); }

/* ---- 下部：状況カード（必要なときだけ出る・小さめ） ---- */
#statusCard{
  position:fixed; z-index:20; left:12px; right:12px;
  background:var(--card); box-shadow:var(--shadow);
  border-radius:var(--radius); padding:9px 12px;
  font-size:13px; line-height:1.5; color:#33413A;
  max-height:30vh; overflow-y:auto;
  display:none;
}
#statusCard.show{ display:block; }
#statusCard .src{ font-size:10.5px; color:#8A968D; margin-top:3px; }
#statusCard .act{ /* カード内の小ボタン共通 */
  display:inline-block; margin:6px 6px 0 0;
  border-radius:999px; padding:6.5px 12px;
  font-size:12.5px; font-weight:700;
  background:#EFEEE6; color:var(--ink);
}
#statusCard .act.primary{ background:var(--me); color:#fff; }
#statusCard .act.danger{ background:#FBEAE8; color:var(--danger); }

/* ルート表示中だけの、1行のコンパクト表示 */
.rt{ display:flex; align-items:center; gap:8px; }
.rt-txt{ flex:1; min-width:0; }
.rt-txt b{
  display:block; font-size:13px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.rt-txt span{ display:block; font-size:11.5px; color:#7A877D; }
.rt-gmap{
  flex:none; border-radius:999px; padding:7px 11px;
  font-size:11.5px; font-weight:700;
  background:#EFEEE6; color:#3C4A41;
}
.rt-x{
  flex:none; width:32px; height:32px; border-radius:50%;
  background:#FBEAE8; color:var(--danger);
  font-size:15px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
}

/* ---- 下部：操作パネル（コンパクトな2段） ---- */
#panel{
  position:fixed; z-index:20; left:12px; right:12px;
  bottom:calc(12px + env(safe-area-inset-bottom));
  background:var(--card); box-shadow:var(--shadow);
  border-radius:var(--radius); padding:10px;
  display:flex; flex-direction:column; gap:8px;
}
.panel-row{ display:flex; align-items:center; gap:8px; }
#searchBtn{
  flex:1.1; background:var(--store); color:#fff;
  border-radius:12px; padding:12px 6px;
  font-size:14px; font-weight:700; letter-spacing:.02em;
  font-family:"Zen Maru Gothic",sans-serif;
  box-shadow:0 2px 6px rgba(15,163,107,.3);
}
#searchBtn:active{ transform:translateY(1px); }
#searchHereBtn{
  flex:1; border-radius:12px; padding:12px 6px;
  font-size:13.5px; font-weight:700;
  font-family:"Zen Maru Gothic",sans-serif;
  color:var(--store); border:2px solid var(--store); background:#fff;
}
#searchHereBtn:active{ transform:translateY(1px); }

.sub{ font-size:12px; color:#5C6B60; }
.sub .lbl{ flex:none; font-weight:600; }
input[type=range]{ flex:1; accent-color:var(--store); height:22px; min-width:0; }
#radiusVal{
  flex:none; width:52px; text-align:right;
  font-size:12.5px; font-weight:700; color:var(--ink);
  font-variant-numeric:tabular-nums;
}
/* 徒歩／車の小さな切り替え */
#modeToggle{
  flex:none; display:flex; background:#EFEEE6; border-radius:999px; padding:2.5px;
}
#modeToggle button{
  border-radius:999px; padding:5.5px 11px;
  font-size:12px; font-weight:700; color:#6B7A6F;
  transition:background .15s,color .15s;
}
#modeToggle button.on{ background:var(--route); color:#fff; }

/* ---- トースト（画面中央やや上・赤文字・1.5秒で消える） ---- */
#toast{
  position:fixed; left:50%; top:20%; transform:translateX(-50%);
  z-index:40; background:#fff; color:var(--danger);
  border:1.5px solid var(--danger); border-radius:14px;
  padding:11px 18px; font-size:13.5px; font-weight:700;
  box-shadow:0 4px 14px rgba(0,0,0,.18);
  max-width:86%; text-align:center;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
#toast.show{ opacity:1; }

/* ============================================================
   地図上のピン・線
   ============================================================ */
.me-icon{ /* 現在地：青い点＋脈打つ輪 */
  width:16px; height:16px; border-radius:50%;
  background:var(--me); border:3px solid #fff;
  box-shadow:0 0 0 1px rgba(47,125,246,.5),0 2px 6px rgba(0,0,0,.3);
  position:relative;
}
.me-icon::after{
  content:""; position:absolute; inset:-7px; border-radius:50%;
  border:2px solid var(--me); opacity:.5;
  animation:radar 2.4s ease-out infinite;
}
.center-icon{ /* ◎ピン：橙 */
  width:28px; height:28px; border-radius:50%;
  border:3.5px solid var(--center); background:rgba(255,255,255,.9);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}
.center-icon::after{
  content:""; width:9px; height:9px; border-radius:50%; background:var(--center);
}
.ab-icon{ /* 出発・到着のラベル付きピン */
  width:28px; height:28px; border-radius:50%;
  color:#fff; font-size:12.5px; font-weight:800;
  display:flex; align-items:center; justify-content:center;
  border:2.5px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,.35);
}
.ab-icon.a{ background:var(--me); }
.ab-icon.b{ background:var(--ink); }

/* ポップアップ */
.pp-name{ font-weight:700; font-size:14px; margin-bottom:2px; }
.pp-dist{ font-size:12px; color:#6B7A6F; margin-bottom:8px; }
.pp-btn{
  display:block; width:100%; border-radius:10px;
  padding:9px 10px; font-size:13px; font-weight:700; margin-top:6px; text-align:center;
}
.pp-route{ background:var(--route); color:#fff; }
.pp-gmap{ background:#EFEEE6; color:#3C4A41; }
.pp-remove{ background:#FBEAE8; color:var(--danger); }
.leaflet-popup-content{ margin:12px 14px; min-width:190px; }
.leaflet-popup-content-wrapper{ border-radius:12px; }

/* ============================================================
   履歴シート（下からせり出す）
   ============================================================ */
#sheetBack{
  position:fixed; inset:0; background:rgba(20,30,25,.45);
  z-index:100; opacity:0; pointer-events:none; transition:opacity .2s;
}
#sheetBack.show{ opacity:1; pointer-events:auto; }
#sheet{
  position:fixed; left:0; right:0; bottom:0; z-index:101;
  background:#fff; border-radius:20px 20px 0 0;
  max-height:72vh; display:flex; flex-direction:column;
  transform:translateY(105%); transition:transform .25s ease;
  padding-bottom:env(safe-area-inset-bottom);
}
#sheet.show{ transform:translateY(0); }
.sheet-head{
  display:flex; align-items:center; gap:10px;
  padding:16px 16px 10px; border-bottom:1px solid #E4E2D8;
}
.sheet-head h2{
  font-family:"Zen Maru Gothic",sans-serif; font-size:16px; font-weight:700;
}
.sheet-head .ver{ font-size:11px; color:#9AA69D; }
.spacer{ flex:1; }
#clearAllBtn{ color:var(--danger); font-size:12.5px; font-weight:600; padding:6px 8px; }
#closeSheetBtn{
  background:#EFEEE6; border-radius:999px; width:32px; height:32px;
  font-size:15px; color:#5C6B60; flex:none;
}
#histList{ overflow-y:auto; padding:4px 0 12px; }
.hist-row{
  display:flex; align-items:center; gap:10px;
  padding:11px 16px; border-bottom:1px solid #F0EFE7;
}
.hist-main{ flex:1; min-width:0; }
.hist-name{
  font-size:14px; font-weight:700;
  display:flex; align-items:center; gap:7px; flex-wrap:wrap;
}
.hist-sub{ font-size:12px; color:#7A877D; margin-top:3px; }
/* 出発地バッジ：目立たない同系統（寒色）のわずかな違い */
.badge{ font-size:10.5px; font-weight:600; border-radius:6px; padding:2px 7px; flex:none; }
.badge.me{     background:#E8EEF6; color:#456492; } /* 現在地から：淡い青系 */
.badge.center{ background:#EAE7F2; color:#5a5288; } /* ◎ピンから：淡い藍系 */
.hist-del{ color:var(--danger); font-size:12.5px; font-weight:600; padding:8px 6px; flex:none; }
.hist-empty{ padding:36px 20px; text-align:center; color:#8A968D; font-size:13.5px; }
</style>
</head>
<body>

<!-- ═══════ 地図（全画面） ═══════ -->
<div id="map"></div>

<!-- ═══════ 浮かぶUI ═══════ -->
<div id="brand"><div class="logo-dot"></div><b>コンビニレーダー</b></div>
<button id="historyBtn">履歴</button>
<div id="reticle"></div>
<button id="abBtn">ルート沿い</button>
<button id="meBtn" title="現在地へ">◉</button>

<div id="statusCard"></div>

<div id="panel">
  <div class="panel-row">
    <button id="searchBtn">現在地で探す</button>
    <button id="searchHereBtn">十字の位置で探す</button>
  </div>
  <div class="panel-row sub">
    <span class="lbl">範囲</span>
    <input type="range" id="radius" min="200" max="3000" step="100" value="500">
    <span id="radiusVal">500 m</span>
    <div id="modeToggle">
      <button data-v="foot" class="on">徒歩</button>
      <button data-v="car">車</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- ═══════ 履歴シート ═══════ -->
<div id="sheetBack"></div>
<div id="sheet">
  <div class="sheet-head">
    <h2>ルート表示の履歴</h2>
    <span class="ver" id="verLabel"></span>
    <div class="spacer"></div>
    <button id="clearAllBtn">すべて消去</button>
    <button id="closeSheetBtn">×</button>
  </div>
  <div id="histList"></div>
</div>

<script>
/* ════════════════════════════════════════════════════════════

const APP_VERSION = '1.3.0';  // バージョン（冒頭コメント・履歴シートの表示と合わせる）
document.getElementById('verLabel').textContent = 'v' + APP_VERSION;

// Yahoo!のClient ID。空文字 '' にすると自動でOSM(Overpass)に切り替わる（動作確認用）
const YAHOO_CLIENT_ID = 'dmVyPTIwMjUwNyZpZD1ZU2xVUGlzZzRTJmhhc2g9WkRjME16ZzFZalZrTjJFeE16WmxOQQ';
const HIST_KEY  = 'konbini_routes_v1'; // 履歴の保存キー
const HIST_MAX  = 30;                  // 履歴の最大件数
const TOKYO_STA = [35.681, 139.767];   // 現在地が取れないときの初期位置（東京駅）

/* ════════════════════════════════════════════════════════════
   アプリの状態（いま何が起きているか）

let me = null;            // 現在地 {lat, lng, acc}。取れていなければ null

let centerPin = null;     // ◎ピン（長押しで置く）。無ければ null

let abA = null, abB = null; // 出発地・到着地 {lat,lng}

/* 地図の部品（あとで消せるように覚えておく） */
let meMarker = null, meCircle = null;       // 現在地の点と精度円
let searchCircle = null;                    // 探索範囲の緑の円
let storeLayer = null;                      // コンビニのピンをまとめる層
let routeLine = null, routeDot = null;      // 店へのルート（紫の線＋点）

/* ════════════════════════════════════════════════════════════

const map = L.map('map', { zoomControl: false }).setView(TOKYO_STA, 15);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
}).addTo(map);
storeLayer = L.layerGroup().addTo(map);

// UIが地図に重なる分、拡大縮小などで見切れないよう余白を意識してfitする
const FIT_PAD = { paddingTopLeft: [30, 70], paddingBottomRight: [30, 150] };

/* ════════════════════════════════════════════════════════════
   小さな道具（あちこちで使う関数）
   ════════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);

// 状況カードに日本語で状況を出す。空文字ならカードごと隠す
function setStatus(html){
  const el = $('statusCard');
  if (!html){ el.classList.remove('show'); el.innerHTML = ''; return; }

}

// 状況カードと現在地ボタンを、操作パネルのすぐ上に並べる
function placeFloating(){
  // 操作パネルの上端の位置を測り、その少し上に状況カード・◉・「ルート沿い」を積む
  const panelTop = $('panel').getBoundingClientRect().top;

}

// 赤いトースト（1.5秒で自動的に消える）
let toastTimer = null;
function showToast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1500);
}

// 2点間のおおよその直線距離（メートル）。ハバサイン公式という計算方法
function distM(a, b){
  const R = 6371000, rad = x => x * Math.PI / 180;
  const dLat = rad(b.lat - a.lat), dLng = rad(b.lng - a.lng);
  const s = Math.sin(dLat/2)**2 +
            Math.cos(rad(a.lat)) * Math.cos(rad(b.lat)) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(s));
}
// 距離を読みやすい文字にする（830m / 1.2km など）
function fmtDist(m){
  return m < 1000 ? Math.round(m) + ' m' : (m/1000).toFixed(1) + ' km';
}
// 所要時間（秒）を読みやすい文字にする（約8分 / 約1時間5分 など）
function fmtDur(sec){
  const min = Math.round(sec / 60);
  if (min < 1)  return '1分未満';
  if (min < 60) return min + '分';
  return Math.floor(min/60) + '時間' + (min % 60 ? (min % 60) + '分' : '');
}
// 文字をHTMLに安全に入れる（店名に記号があっても崩れないように）
function esc(s){
  return String(s).replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// 最後に検索した中心（「Google Mapでこの周辺も見る」で使う）
let lastCenter = null;
function gmapCenter(){
  if (lastCenter) return lastCenter;
  if (centerPin){ const p = centerPin.getLatLng(); return {lat:p.lat, lng:p.lng}; }
  if (me) return {lat:me.lat, lng:me.lng};
  const c = map.getCenter(); return {lat:c.lat, lng:c.lng};
}

// ルートの出発地。◎ピンがあればピンから、なければ現在地から（自動で決まる）
function routeOrigin(){
  if (centerPin){
    const p = centerPin.getLatLng();
    return { lat:p.lat, lng:p.lng, kind:'center' };
  }
  if (me) return { lat:me.lat, lng:me.lng, kind:'me' };
  showToast('現在地がまだ取れていません。◉ボタンを押すか、地図を長押ししてピンを置いてください');
  return null;
}

/* ════════════════════════════════════════════════════════════
   現在地
   ════════════════════════════════════════════════════════════ */
function locate(moveMap){
  if (!navigator.geolocation){
    setStatus('この端末では位置情報が使えません。地図を長押ししてピンを置くと、その場所のまわりを探せます。');
    return;
  }
  navigator.geolocation.getCurrentPosition(pos => {
    me = { lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy };
    if (meMarker) map.removeLayer(meMarker);
    if (meCircle) map.removeLayer(meCircle);
    meMarker = L.marker([me.lat, me.lng], {
      icon: L.divIcon({ className:'', html:'<div class="me-icon"></div>', iconSize:[16,16], iconAnchor:[8,8] }),
      zIndexOffset: 800
    }).addTo(map);
    meCircle = L.circle([me.lat, me.lng], {
      radius: Math.min(me.acc, 300),
      color: '#2F7DF6', weight: 1, opacity: .5, fillOpacity: .08
    }).addTo(map);
    if (moveMap) map.setView([me.lat, me.lng], 16);
    setStatus('現在地を表示しました。「現在地で探す」でまわりのコンビニを探せます。<div class="src">別の場所を探すには: 地図を動かして「十字の位置で探す」／地図を長押しで◎ピン</div>');
  }, err => {
    setStatus('現在地が取れませんでした（' + esc(err.message) + '）。<br>' +
      'ブラウザの位置情報の許可を確認してください。位置情報は https のページでしか使えません。<br>' +
      'とりあえず東京駅を表示しています。地図を動かして<b>「十字の位置で探す」</b>を押せば、その場所を探せます。');
  }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 });
}

/* ════════════════════════════════════════════════════════════
   ◎ピン（地図を長押しで置く）
   ════════════════════════════════════════════════════════════ */
// Leafletの contextmenu イベントは「スマホの長押し」と「PCの右クリック」の両方で発生する
map.on('contextmenu', e => {
  if (abStep) return; // ルート沿い検索の途中は誤操作を防ぐため無効

});
function placePin(latlng, quiet){
  if (!centerPin){
    centerPin = L.marker(latlng, {
      draggable: true,
      icon: L.divIcon({ className:'', html:'<div class="center-icon"></div>', iconSize:[28,28], iconAnchor:[14,14] }),

      '<button class="pp-btn pp-route" onclick="map.closePopup(); doSearch(&quot;pin&quot;)">このあたりを探す</button>' +
      '<button class="pp-btn pp-remove" onclick="removePin()">ピンを外す</button>'
    );
    // ピンをドラッグして離したら、ピン中心の検索を新しい場所でかけ直す
    centerPin.on('dragend', () => {
      if (lastSearch && lastSearch.type === 'circle' && lastSearch.label !== '現在地'){
        const p = centerPin.getLatLng();
        searchArea({ lat: p.lat, lng: p.lng }, lastSearch.label, false);
      }
    });
  }else{
    centerPin.setLatLng(latlng);
  }
  if (!quiet) setStatus('◎ピンを置きました。ピンをタップして「このあたりを探す」を押すと、ピンのまわりを探します。<div class="src">ドラッグで移動／ルートの出発地もピンになります</div>');
}
function removePinQuiet(){ // 文言を出さずに◎ピンだけ外す（内部用）
  if (centerPin){ map.removeLayer(centerPin); centerPin = null; }
}
function removePin(){

/* ════════════════════════════════════════════════════════════
   コンビニ検索（YOLPが主・OSMが予備）
   ════════════════════════════════════════════════════════════ */
// YOLPをJSONPで呼ぶ（ブラウザから直接fetchするとCORSで弾かれるため、この方式にしている）
function jsonp(url){
  return new Promise((resolve, reject) => {
    const name = 'jp' + Date.now() + Math.floor(Math.random()*1e5);
    const sc = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 12000);
    function cleanup(){ clearTimeout(timer); delete window[name]; sc.remove(); }
    window[name] = data => { cleanup(); resolve(data); };
    sc.src = url + '&callback=' + name;
    sc.onerror = () => { cleanup(); reject(new Error('load error')); };
    document.body.appendChild(sc);
  });
}
// YOLPで1回円検索する → 店の配列 [{name,lat,lng}]
async function yolpCircle(lat, lng, radiusM){
  const url = 'https://map.yahooapis.jp/search/local/V1/localSearch'
    + '?appid=' + encodeURIComponent(YAHOO_CLIENT_ID)
    + '&lat=' + lat + '&lon=' + lng
    + '&dist=' + (radiusM / 1000)      // YOLPの距離はkm単位
    + '&gc=0205001'                    // 業種コード: コンビニ
    + '&results=100&sort=dist&output=json';
  const data = await jsonp(url);
  return (data.Feature || []).map(f => {
    const [lng2, lat2] = f.Geometry.Coordinates.split(',').map(Number);
    return { name: f.Name, lat: lat2, lng: lng2 };
  });
}

// Overpass(OSM)のサーバー一覧（混雑で失敗したら次を試す）
const OVERPASS_URLS = [
  'https://overpass-api.de/api/interpreter',
  'https://overpass.kumi.systems/api/interpreter',
  'https://overpass.private.coffee/api/interpreter'
];
async function overpassQuery(query){
  let lastErr = null;
  for (const base of OVERPASS_URLS){
    try{
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 20000);
      const res = await fetch(base, { method:'POST', body:'data=' + encodeURIComponent(query), signal: ctrl.signal });
      clearTimeout(timer);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      return (data.elements || []).map(el => ({
        name: (el.tags && el.tags.name) || 'コンビニ',
        lat: el.lat != null ? el.lat : (el.center && el.center.lat),
        lng: el.lon != null ? el.lon : (el.center && el.center.lon)
      })).filter(s => s.lat != null);
    }catch(e){ lastErr = e; }
  }
  throw lastErr || new Error('Overpass失敗');
}
// Overpassで円検索（コンビニ + 主要チェーンのブランド名でも拾う）
function overpassCircle(lat, lng, radiusM){
  const brands = 'セブン|ファミリーマート|ローソン|ミニストップ|デイリーヤマザキ|セイコーマート|ポプラ|NewDays';
  const q = `[out:json][timeout:20];
(
  node["shop"="convenience"](around:${radiusM},${lat},${lng});
  way["shop"="convenience"](around:${radiusM},${lat},${lng});
  node["name"~"${brands}"](around:${radiusM},${lat},${lng});
);
out center;`;
  return overpassQuery(q);
}

// 重複除去：「名前（空白を除いて比較）が同じ」かつ「30m以内」なら同じ店とみなして1件にする
// （YOLPは同じ店を複数返すことがある。座標の完全一致だけでは取り切れなかったため、この方式）
function dedup(list){
  const kept = [];
  for (const s of list){
    const key = String(s.name).replace(/\s+/g, '');
    const dup = kept.some(k =>
      String(k.name).replace(/\s+/g, '') === key && distM(k, s) <= 30);
    if (!dup) kept.push(s);
  }
  return kept;
}

// 検索結果を地図に描く。headSub は「範囲」や「ルート長」などの短い補足文
function renderStores(list, srcLabel, headSub){
  storeLayer.clearLayers();
  stores = list;
  if (me) stores.sort((a, b) => distM(me, a) - distM(me, b)); // 現在地があれば近い順

  stores.forEach((s, i) => {
    const m = L.circleMarker([s.lat, s.lng], {
      radius: 9, color: '#fff', weight: 2.5,
      fillColor: '#0FA36B', fillOpacity: 1
    }).addTo(storeLayer);
    const d = me ? '現在地からおよそ ' + fmtDist(distM(me, s)) : '';
    m.bindPopup(
      '<div class="pp-name">' + esc(s.name) + '</div>' +
      (d ? '<div class="pp-dist">' + d + '</div>' : '') +
      '<button class="pp-btn pp-route" onclick="routeToStore(' + i + ')">ルートを表示する</button>' +
      '<button class="pp-btn pp-gmap" onclick="openGmapRoute(' + i + ')">Google Mapでルートを開く</button>'
    );
  });

  // 1行の小さなカードで件数だけ知らせる（×で表示を閉じられる。ピンは残る）
  setStatus('<div class="rt">' +
    '<div class="rt-txt"><b>コンビニ ' + stores.length + '件</b>' +
    '<span>' + (headSub ? headSub + '・' : '') + 'ピンをタップで詳細・' + srcLabel + '</span></div>' +
    '<button class="rt-x" onclick="setStatus(\'\')">×</button></div>');
}

// 検索結果・円・ルートをまとめて消して、地図をきれいにする
function clearResults(){
  storeLayer.clearLayers();
  stores = [];
  lastSearch = null;
  if (searchCircle){ map.removeLayer(searchCircle); searchCircle = null; }
  clearRouteLayers();
  setStatus('');
}

// Googleマップで周辺のコンビニを見る（0件・失敗のときの逃げ道）
function openGmapArea(){
  const c = gmapCenter();
  window.open('https://www.google.com/maps/search/コンビニ/@' + c.lat + ',' + c.lng + ',16z', '_blank');
}

// 直近の検索内容（範囲スライダーでのかけ直しに使う）
// {type:'circle', c:{lat,lng}, label} または {type:'ab', coords, head}
let lastSearch = null;

// 「探す」入口。kind: 'me'=現在地 / 'map'=十字の位置（地図の中心） / 'pin'=◎ピン
function doSearch(kind){
  if (abStep){ showToast('ルート沿い検索の途中です。先に「中止」してください'); return; }

  let c, label;
  if (kind === 'pin' && centerPin){
    const p = centerPin.getLatLng();
    c = { lat: p.lat, lng: p.lng }; label = '◎ピン';
  }else if (kind === 'map'){
    const p = map.getCenter();
    c = { lat: p.lat, lng: p.lng }; label = '十字の位置';
    placePin(c, true); // 探した中心が分かるように◎ピンを立てる（ルートの出発地にもなる）
  }else{
    if (!me){
      showToast('現在地がまだ取れていません。◉ボタンを押すか、「十字の位置で探す」を使ってください');
      return;
    }
    c = { lat: me.lat, lng: me.lng }; label = '現在地';
    removePinQuiet(); // 現在地で探すときは◎ピンを外す（出発地も現在地に戻る）
  }
  searchArea(c, label, true);
}

// 円検索の本体。fit=true のときだけ円全体が見えるよう地図を動かす
// （範囲スライダーでのかけ直しは fit=false で呼ばれ、地図は動かない）
async function searchArea(c, label, fit){
  lastCenter = c;
  lastSearch = { type: 'circle', c: c, label: label };
  const r = Number($('radius').value);

  if (searchCircle) map.removeLayer(searchCircle);
  searchCircle = L.circle([c.lat, c.lng], {
    radius: r, color: '#0FA36B', weight: 2, opacity: .7,
    fillColor: '#0FA36B', fillOpacity: .07
  }).addTo(map);
  if (fit) map.fitBounds(searchCircle.getBounds(), FIT_PAD);

  setStatus(label + 'のまわり ' + fmtDist(r) + ' を探しています…');
  try{
    const list = YAHOO_CLIENT_ID
      ? dedup(await yolpCircle(c.lat, c.lng, r))
      : dedup(await overpassCircle(c.lat, c.lng, r));
    if (!list.length){
      storeLayer.clearLayers();
      stores = [];
      setStatus('この範囲にはコンビニが見つかりませんでした。「範囲」を広げると自動で探し直します。' +
        '<br><button class="act" onclick="openGmapArea()">Google Mapでこの周辺も見る</button>');
      return;
    }
    renderStores(list, YAHOO_CLIENT_ID ? 'Yahoo! JAPAN' : 'OpenStreetMap',
      label + 'から ' + fmtDist(r));
  }catch(e){
    setStatus('検索に失敗しました。通信状況を確認して、少し時間をおいてからもう一度試してください。' +
      '<br><button class="act" onclick="openGmapArea()">Google Mapでこの周辺も見る</button>');
  }
}

/* ════════════════════════════════════════════════════════════
   ルート表示（店へ・OSRM）
   ════════════════════════════════════════════════════════════ */
async function osrmRoute(from, to, mode){
  const prof = mode === 'car'
    ? 'routed-car/route/v1/driving'
    : 'routed-foot/route/v1/foot';
  const url = 'https://routing.openstreetmap.de/' + prof + '/'
    + from.lng + ',' + from.lat + ';' + to.lng + ',' + to.lat
    + '?overview=full&geometries=geojson';
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 15000);
  const res = await fetch(url, { signal: ctrl.signal });
  clearTimeout(timer);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if (!data.routes || !data.routes.length) throw new Error('ルートなし');
  return data.routes[0]; // {geometry(GeoJSON), distance(m), duration(秒)}
}

// 表示中のルート類（紫の線・青の線・出発到着ピン）を消す
function clearRouteLayers(){
  if (routeLine){ map.removeLayer(routeLine); routeLine = null; }
  if (routeDot){ map.removeLayer(routeDot); routeDot = null; }
  if (abLine){ map.removeLayer(abLine); abLine = null; }
  if (abMarkerA){ map.removeLayer(abMarkerA); abMarkerA = null; }
  if (abMarkerB){ map.removeLayer(abMarkerB); abMarkerB = null; }
  currentDest = null;
  // ルート沿いの検索は元のルートが消えたので、スライダーでのかけ直し対象から外す
  if (lastSearch && lastSearch.type === 'ab') lastSearch = null;
}
function clearRouteAndSay(){
  clearRouteLayers();
  setStatus('ルートを消しました。');
}

// ルートのGeoJSONを紫の線で描く（履歴の再表示でも同じ関数を使う）
// fit=true のときだけ地図を動かす。通常のルート表示では動かさない（見ている場所を保つ）
function drawRoute(geo, dest, fit){
  if (routeLine) map.removeLayer(routeLine);
  if (routeDot)  map.removeLayer(routeDot);
  routeLine = L.geoJSON(geo, { style:{ color:'#7048E8', weight:5, opacity:.85 } }).addTo(map);
  routeDot = L.circleMarker([dest.lat, dest.lng], {
    radius: 7, color:'#fff', weight:2, fillColor:'#7048E8', fillOpacity:1
  }).addTo(map);
  if (fit) map.fitBounds(routeLine.getBounds(), FIT_PAD);
}

// ルート表示中の、1行の小さな状況表示を組み立てる
function routeStatusHtml(name, sub, lat, lng){
  return '<div class="rt">' +
    '<div class="rt-txt"><b>' + esc(name) + '</b><span>' + sub + '</span></div>' +
    '<button class="rt-gmap" onclick="openGmapTo(' + lat + ',' + lng + ')">Gマップ</button>' +
    '<button class="rt-x" onclick="clearRouteAndSay()">×</button>' +
  '</div>';
}

// 店までのルートを表示する（ピンのポップアップから呼ばれる）
async function routeToStore(i){
  const s = stores[i];
  if (!s) return;
  await showRouteTo({ lat:s.lat, lng:s.lng, name:s.name }, true);
}

// ルート表示の本体。saveHist=true なら履歴に残す
async function showRouteTo(dest, saveHist){
  const from = routeOrigin();
  if (!from) return;
  map.closePopup();
  const modeLabel = travelMode === 'car' ? '車' : '徒歩';
  const fromLabel = from.kind === 'center' ? '◎ピン' : '現在地';
  setStatus(esc(dest.name) + ' までの' + modeLabel + 'ルートを計算しています…');
  try{
    const r = await osrmRoute(from, dest, travelMode);
    drawRoute(r.geometry, dest, false); // 地図は動かさない（見ている場所を保つ）
    currentDest = dest;
    setStatus(routeStatusHtml(
      dest.name,
      modeLabel + ' 約 ' + fmtDist(r.distance) + '・約 ' + fmtDur(r.duration) + '（' + fromLabel + 'から）',
      dest.lat, dest.lng
    ));
    if (saveHist) addHistory(dest, r, from.kind);
  }catch(e){
    setStatus('ルートの計算に失敗しました。ルート検索の無料サーバーが混みあっている可能性があります。<br>' +
      '少し待ってもう一度試すか、下のボタンでGoogleマップを使ってください。' +
      '<br><button class="act primary" onclick="openGmapTo(' + dest.lat + ',' + dest.lng + ')">Google Mapでルートを開く</button>');
  }
}

// Googleマップでルートを開く（表示するだけ。ナビは自動開始しない）
function openGmapRoute(i){
  const s = stores[i];
  if (!s) return;
  openGmapTo(s.lat, s.lng);
}
function openGmapTo(lat, lng){
  const from = routeOrigin();
  if (!from) return;
  const tm = travelMode === 'car' ? 'driving' : 'walking';
  window.open('https://www.google.com/maps/dir/?api=1'
    + '&origin=' + from.lat + ',' + from.lng
    + '&destination=' + lat + ',' + lng
    + '&travelmode=' + tm, '_blank');
  // 注意: dir_action=navigate は付けない（ナビ自動開始は不要、と決めてある）
}

/* ════════════════════════════════════════════════════════════
   履歴（localStorage・ルートを表示したときだけ保存）
   ════════════════════════════════════════════════════════════ */
function loadHist(){
  try{ return JSON.parse(localStorage.getItem(HIST_KEY)) || []; }
  catch(e){ return []; }
}
function saveHist(list){
  try{ localStorage.setItem(HIST_KEY, JSON.stringify(list)); }catch(e){ /* 容量オーバー等は無視 */ }
}
function addHistory(dest, route, originKind){
  const list = loadHist();
  list.unshift({
    t: Date.now(),                 // いつ
    name: dest.name,               // どの店
    mode: travelMode,              // 'foot' か 'car'
    origin: originKind,            // 'me'（現在地から） か 'center'（◎ピンから）
    dist: Math.round(route.distance),
    dur:  Math.round(route.duration),
    d: [dest.lat, dest.lng],       // 目的地の座標
    geo: route.geometry            // ルートの形（再表示は再計算せずこれを使う）
  });
  saveHist(list.slice(0, HIST_MAX)); // 新しい順に最大30件
}
function fmtWhen(t){
  const d = new Date(t);
  const p = n => String(n).padStart(2, '0');
  return (d.getMonth()+1) + '/' + d.getDate() + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
}
function renderHist(){
  const list = loadHist();
  const box = $('histList');
  if (!list.length){
    box.innerHTML = '<div class="hist-empty">まだ履歴がありません。<br>コンビニのピンから「ルートを表示する」と、ここに残ります。</div>';
    return;
  }
  box.innerHTML = list.map((h, i) => {
    const badge = h.origin === 'center'
      ? '<span class="badge center">◎ピンから</span>'
      : '<span class="badge me">現在地から</span>';
    const mode = h.mode === 'car' ? '車' : '徒歩';
    return '<div class="hist-row">' +
      '<div class="hist-main" onclick="replayHist(' + i + ')">' +
        '<div class="hist-name">' + esc(h.name) + badge + '</div>' +
        '<div class="hist-sub">' + mode + ' ・ ' + fmtDist(h.dist) + ' ・ ' + fmtDur(h.dur) + ' ・ ' + fmtWhen(h.t) + '</div>' +
      '</div>' +
      '<button class="hist-del" onclick="delHist(' + i + ')">削除</button>' +
    '</div>';
  }).join('');
}
// 履歴の行をタップ → 保存してあるルートの形をそのまま描き直す（再計算しない）
function replayHist(i){
  const h = loadHist()[i];
  if (!h) return;
  closeSheet();
  drawRoute(h.geo, { lat: h.d[0], lng: h.d[1] }, true); // 再表示のときだけルート全体が見えるよう移動
  currentDest = { lat: h.d[0], lng: h.d[1], name: h.name };
  const mode = h.mode === 'car' ? '車' : '徒歩';
  setStatus(routeStatusHtml(
    h.name,
    mode + ' 約 ' + fmtDist(h.dist) + '・約 ' + fmtDur(h.dur) + '（' + fmtWhen(h.t) + 'の履歴）',
    h.d[0], h.d[1]
  ));
}
function delHist(i){
  const list = loadHist();
  list.splice(i, 1);
  saveHist(list);
  renderHist();
}
function openSheet(){ renderHist(); $('sheetBack').classList.add('show'); $('sheet').classList.add('show'); }
function closeSheet(){ $('sheetBack').classList.remove('show'); $('sheet').classList.remove('show'); }

/* ════════════════════════════════════════════════════════════
   ルート沿いのコンビニ検索（案内に従うステップ操作）
   流れ: 「ルート沿い」→ ①出発地（現在地ボタン or 地図タップ）
         → ②到着地（地図タップ）→ 自動でルート表示＆沿線検索 → 自動で終了
   ════════════════════════════════════════════════════════════ */
function abIcon(label){
  return L.divIcon({
    className:'', iconSize:[28,28], iconAnchor:[14,14],
    html:'<div class="ab-icon ' + (label === '発' ? 'a' : 'b') + '">' + label + '</div>'
  });
}
function startAb(){
  clearResults();          // 前の結果やルートを消してから始める
  abStep = 1; abA = null; abB = null;
  $('abBtn').textContent = '中止';
  $('abBtn').classList.add('on');
  setStatus('<b>ルート沿い検索 ①</b> 出発地を決めてください。<b>地図をタップ</b>するか、下のボタンをどうぞ。' +
    '<br><button class="act primary" onclick="abUseMe()">現在地から出発</button>' +
    '<button class="act" onclick="cancelAb()">中止</button>' +
    '<div class="src">「範囲」スライダーが、ルートからどのくらいの幅まで探すかになります</div>');
}
function abUseMe(){
  if (!me){ showToast('現在地がまだ取れていません。◉ボタンで取得してから試してください'); return; }
  abSetA({ lat: me.lat, lng: me.lng });
}
function abSetA(latlng){
  abA = { lat: latlng.lat, lng: latlng.lng };
  abMarkerA = L.marker([abA.lat, abA.lng], { icon: abIcon('発'), zIndexOffset: 900 }).addTo(map);
  abStep = 2;
  setStatus('<b>ルート沿い検索 ②</b> 次に、<b>到着地を地図でタップ</b>してください。タップすると自動で検索が始まります。' +
    '<br><button class="act" onclick="abRestart()">出発地からやり直す</button>' +
    '<button class="act" onclick="cancelAb()">中止</button>');
}
function abRestart(){
  if (abMarkerA){ map.removeLayer(abMarkerA); abMarkerA = null; }
  if (abMarkerB){ map.removeLayer(abMarkerB); abMarkerB = null; }
  abA = null; abB = null;
  startAb();
}
function cancelAb(){
  abStep = 0;
  if (abMarkerA){ map.removeLayer(abMarkerA); abMarkerA = null; }
  if (abMarkerB){ map.removeLayer(abMarkerB); abMarkerB = null; }
  if (abLine){ map.removeLayer(abLine); abLine = null; }
  if (lastSearch && lastSearch.type === 'ab') lastSearch = null;
  $('abBtn').textContent = 'ルート沿い';
  $('abBtn').classList.remove('on');
  setStatus('ルート沿い検索を中止しました。');
}
// モードを終える（線や結果は残したまま、ボタンだけ元に戻す）
function endAbMode(){
  abStep = 0;
  $('abBtn').textContent = 'ルート沿い';
  $('abBtn').classList.remove('on');
}

// ルートの形（座標の列）を、だいたい等間隔の点に間引く（YOLPの円検索用）
function sampleLine(coords, spacingM, maxN){
  const pts = coords.map(c => ({ lat: c[1], lng: c[0] })); // GeoJSONは[経度,緯度]の順
  let total = 0;
  for (let i = 1; i < pts.length; i++) total += distM(pts[i-1], pts[i]);
  const spacing = Math.max(spacingM, total / (maxN - 1) || spacingM);
  const out = [pts[0]];
  let acc = 0;
  for (let i = 1; i < pts.length; i++){
    acc += distM(pts[i-1], pts[i]);
    if (acc >= spacing){ out.push(pts[i]); acc = 0; }
    if (out.length >= maxN) break;
  }
  const last = pts[pts.length - 1];
  if (out.length < maxN && distM(out[out.length-1], last) > spacing / 2) out.push(last);
  return out;
}

async function runAbSearch(){
  abStep = 3; // 検索中（地図タップを受け付けない）
  const modeLabel = travelMode === 'car' ? '車' : '徒歩';
  setStatus('出発→到着の' + modeLabel + 'ルートを計算しています…');
  let route;
  try{
    route = await osrmRoute(abA, abB, travelMode);
  }catch(e){
    setStatus('ルートの計算に失敗しました。無料サーバーが混みあっている可能性があります。<br>' +
      '少し待ってから、もう一度お試しください。' +
      '<br><button class="act primary" onclick="abRetry()">もう一度試す</button>' +
      '<button class="act" onclick="cancelAb()">中止</button>');
    abStep = 2; // 到着地は置けているので、再試行できる状態に戻す
    return;
  }
  if (abLine) map.removeLayer(abLine);
  abLine = L.geoJSON(route.geometry, { style:{ color:'#2F7DF6', weight:5, opacity:.85 } }).addTo(map);
  map.fitBounds(abLine.getBounds(), FIT_PAD); // 最初の1回だけルート全体が見えるようにする

  const head = '約' + fmtDist(route.distance) + '・' + modeLabel + '約' + fmtDur(route.duration);
  await searchAlong(route.geometry.coordinates, head);
  endAbMode(); // 終わったらモードは自動で終了（線と結果は残る）
}

// ルート沿いの検索本体。範囲スライダーでのかけ直しでもここが呼ばれる（地図は動かさない）
async function searchAlong(coords, head){
  const r = Number($('radius').value); // スライダー値＝ルートからの幅
  lastSearch = { type: 'ab', coords: coords, head: head };
  try{
    let list = [];
    if (YAHOO_CLIENT_ID){
      // YOLP: ルート上を最大20点サンプリングして、各点で円検索した結果を合わせる
      const pts = sampleLine(coords, r, 20);
      for (let i = 0; i < pts.length; i++){
        setStatus('ルート沿い（幅 ' + fmtDist(r) + '）を検索中…（' + (i+1) + '/' + pts.length + '）');
        try{ list = list.concat(await yolpCircle(pts[i].lat, pts[i].lng, r)); }
        catch(e){ /* 1点分の失敗は飛ばして続ける */ }
      }
      list = dedup(list);
    }else{
      // OSM: ルート線に沿った検索を1回で行う（座標が多すぎるので80点くらいに間引く）
      setStatus('ルート沿い（幅 ' + fmtDist(r) + '）を検索中…');
      const step = Math.max(1, Math.ceil(coords.length / 80));
      const lineStr = coords.filter((_, i) => i % step === 0)
        .map(c => c[1] + ',' + c[0]).join(',');
      const q = `[out:json][timeout:25];
(
  node["shop"="convenience"](around:${r},${lineStr});
  way["shop"="convenience"](around:${r},${lineStr});
);
out center;`;
      list = dedup(await overpassQuery(q));
    }
    if (!list.length){
      storeLayer.clearLayers();
      stores = [];
      setStatus('ルート沿い（幅 ' + fmtDist(r) + '）にコンビニがありません。「範囲」を広げると自動で探し直します。<div class="src">ルート: ' + head + '</div>');
      return;
    }
    renderStores(list, YAHOO_CLIENT_ID ? 'Yahoo! JAPAN' : 'OpenStreetMap',
      'ルート' + head + '・幅 ' + fmtDist(r));
  }catch(e){
    setStatus('ルート沿いの検索に失敗しました。通信状況を確認して、範囲スライダーを動かすか「ルート沿い」からやり直してください。');
  }
}
function abRetry(){ if (abA && abB) runAbSearch(); }

/* ════════════════════════════════════════════════════════════
   画面の操作（ボタンやトグル）
   ════════════════════════════════════════════════════════════ */
// 範囲スライダー：円はその場で追従し、0.5秒止まったら同じ検索をかけ直す
// （地図の位置・拡大率・ルート表示はそのまま。連続でAPIを叩かないための0.5秒）
let sliderTimer = null;
$('radius').addEventListener('input', () => {
  const r = Number($('radius').value);
  $('radiusVal').textContent = r + ' m';
  if (searchCircle) searchCircle.setRadius(r); // 緑の円はリアルタイムに追従
  if (!lastSearch || abStep) return; // 検索前・ルート沿いの途中は何もしない
  clearTimeout(sliderTimer);
  sliderTimer = setTimeout(() => {
    if (lastSearch.type === 'circle'){
      searchArea(lastSearch.c, lastSearch.label, false);       // 同じ中心・新しい範囲
    }else{
      searchAlong(lastSearch.coords, lastSearch.head);         // 同じルート・新しい幅
    }
  }, 500);
});
$('searchBtn').addEventListener('click', () => doSearch('me'));
$('searchHereBtn').addEventListener('click', () => doSearch('map'));
$('meBtn').addEventListener('click', () => locate(true));
$('abBtn').addEventListener('click', () => abStep ? cancelAb() : startAb());

// 地図タップ：ルート沿い検索の途中なら、出発地→到着地を置く
map.on('click', e => {
  if (abStep === 1){ abSetA(e.latlng); return; }
  if (abStep === 2){
    abB = { lat: e.latlng.lat, lng: e.latlng.lng };
    abMarkerB = L.marker([abB.lat, abB.lng], { icon: abIcon('着'), zIndexOffset: 900 }).addTo(map);
    runAbSearch(); // 到着地を置いたら自動で実行
  }
});

// 徒歩／車の切り替え。ルート表示中なら、その場で引き直す
$('modeToggle').querySelectorAll('button').forEach(btn => {
  btn.addEventListener('click', () => {
    $('modeToggle').querySelectorAll('button').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    travelMode = btn.dataset.v;
    if (currentDest) showRouteTo(currentDest, true); // 表示中のルートを新しい手段で引き直す
  });
});

// 履歴シート
$('historyBtn').addEventListener('click', openSheet);
$('closeSheetBtn').addEventListener('click', closeSheet);
$('sheetBack').addEventListener('click', closeSheet);
$('clearAllBtn').addEventListener('click', () => {
  if (confirm('履歴をすべて消去します。よろしいですか？')){
    saveHist([]);
    renderHist();
  }
});

/* ════════════════════════════════════════════════════════════
   起動
   ════════════════════════════════════════════════════════════ */
placeFloating();
window.addEventListener('resize', placeFloating);
setStatus('現在地を取得しています…（位置情報の許可を求められたら「許可」を押してください）');
locate(true);
</script>
